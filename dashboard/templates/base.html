<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Patent Dashboard{% endblock %}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap"
    />

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />

    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  </head>

  <body class="bg-body-tertiary">
    <nav class="navbar navbar-expand-lg bg-white border-bottom">
      <div class="container-fluid">
        <a class="navbar-brand fw-semibold" href="/">Patent Analytics</a>
        <div class="ms-auto text-muted small">
          Updated: {{ last_updated }}
        </div>
      </div>
    </nav>

    <main class="container-fluid py-4 dashboard-page">
      {% block content %}{% endblock %}
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      document.addEventListener("shown.bs.tab", (event) => {
        const targetSelector = event.target.getAttribute("data-bs-target");
        if (!targetSelector || !window.Plotly) {
          return;
        }
        const tabPane = document.querySelector(targetSelector);
        if (!tabPane) {
          return;
        }
        tabPane.querySelectorAll(".js-plotly-plot").forEach((plot) => {
          window.Plotly.Plots.resize(plot);
        });
      });

      window.addEventListener("load", () => {
        if (!window.Plotly) {
          return;
        }
        document.querySelectorAll(".js-plotly-plot").forEach((plot) => {
          window.Plotly.Plots.resize(plot);
        });
      });

      window.addEventListener("resize", () => {
        if (!window.Plotly) {
          return;
        }
        document.querySelectorAll(".js-plotly-plot").forEach((plot) => {
          window.Plotly.Plots.resize(plot);
        });
      });
    </script>
  </body>
</html>
